apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: kuberagent-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: VECTOR_DB_URL
              value: "http://qdrant:6333"
            - name: PICASSO
              value: "http://192.168.200.134:12346"
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  type: NodePort
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30007