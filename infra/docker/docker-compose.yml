services:

  api:
    build:
      context: ../../
    container_name: kuberagent-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ../../output:/app/output
    environment:
      - PICASSO=http://host.docker.internal:11434
      - VECTOR_DB_URL=http://qdrant:6333
    depends_on:
      - qdrant
      - redis

  worker:
    build:
      context: ../../
    container_name: kuberagent-worker
    command: python workers/worker.py
    volumes:
      - ../../output:/app/output
    environment:
      - PICASSO=http://host.docker.internal:11434
      - VECTOR_DB_URL=http://qdrant:6333
    depends_on:
      - qdrant
      - redis

  redis:
    image: redis:7
    container_name: kuberagent-redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: kuberagent-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data: