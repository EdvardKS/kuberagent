services:

  api:
    build:
      context: .
    container_name: api
    command: uvicorn api.main:app --host 0.0.0.0 --port ${API_PORT}
    env_file:
      - .env
    ports:
      - "${API_PORT}:${API_PORT}" 
    depends_on:
      - qdrant
      - redis

  worker:
    build:
      context: .
    container_name: worker
    command: python -m worker.worker
    env_file:
      - .env
    depends_on:
      - redis
      - qdrant

  redis:
    image: redis:7
    container_name: redis
    env_file:
      - .env
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    env_file:
      - .env
    ports:
      - "${QDRANT_PORT}:6333"
      - "${QDRANT_GRPC_PORT}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
  redis_data: